<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - Édition Invincible</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="comic-page">
    <div class="panel header-panel">
        <h1>Mes Missions</h1>
    </div>

    <div class="panel input-panel">
        <div class="input-group">
            <input type="text" id="tache-input" placeholder="Nouvelle menace à neutraliser...">
            <button id="add-btn">POW! (Ajouter)</button>
        </div>
        <div id="error-message" class="hidden"></div>
    </div>

    <div class="panel list-panel">
        <ul id="todo-list">
        </ul>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
